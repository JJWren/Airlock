services:
  api:
    build: .
    container_name: airlock-api
    ports:
      # Format is EXTERNAL:INTERNAL
      - "${AIRLOCK_API_EXTERNAL_PORT:-8000}:${AIRLOCK_API_INTERNAL_PORT:-8000}"
    env_file:
      - .env
    environment:
      - PORT=${INTERNAL_PORT:-8000} # Pass the internal port to the container
    volumes:
      - .:/app
    restart: always
