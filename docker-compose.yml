services:
  api:
    image: airlock-api:dev
    container_name: airlock-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ${SCAN_UPLOAD_PATH}:/uploads
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1  # Forces immediate log flushing
      - LOG_LEVEL=DEBUG
      - PORT=8000
      - SYFT_BINARY_PATH=/usr/local/bin/syft
    restart: always

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./web:/app
      - /app/node_modules # Important: Don't let Windows overwrite container modules
    depends_on:
      - api
